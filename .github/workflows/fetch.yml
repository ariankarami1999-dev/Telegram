name: 📡 تلگرام بدون فیلتر آرین

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'نام کانال (بدون @) - خالی بگذارید برای بروزرسانی همه کانال‌ها'
        required: false
        type: string
      count:
        description: 'تعداد پیام (حداکثر 200)'
        required: false
        default: '100'
        type: string
  schedule:
    - cron: '0 */2 * * *'   # هر ۲ ساعت

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml

      - name: Create directories
        run: mkdir -p channels scripts

      - name: Ensure channels list exists
        run: touch channels.txt

      - name: Fetch channel(s)
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          INPUT_COUNT: ${{ github.event.inputs.count }}
        run: |
          python scripts/fetch_channel.py

      - name: Commit changes
        run: |
          git config user.name "TG Mirror Bot"
          git config user.email "bot@tgmirror.local"
          git add channels/ channels.txt
          git diff --staged --quiet || git commit -m "🔄 بروزرسانی کانال‌ها در $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
