name: 📡 تلگرام ملی

on:
  workflow_dispatch:
    inputs:
      channel:
        description: 'نام کانال (بدون @) - خالی بگذارید برای بروزرسانی همه کانال‌ها'
        required: false
        type: string
      count:
        description: 'تعداد پیام (فقط در صورت افزودن کانال جدید معنی دارد)'
        required: false
        type: string
  schedule:
    - cron: '*/30 * * * *'

permissions:
  contents: write

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml jdatetime

      - name: Create directories
        run: mkdir -p channels scripts

      - name: Ensure channels list exists
        run: touch channels.txt

      - name: Fetch channel(s)
        env:
          INPUT_CHANNEL: ${{ github.event.inputs.channel }}
          INPUT_COUNT: ${{ github.event.inputs.count }}
        run: |
          python scripts/fetch_channel.py

      - name: Commit and push with retry
        run: |
          git config user.name "TG Mirror Bot"
          git config user.email "bot@tgmirror.local"
          git add channels/ channels.txt
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          git commit -m "🔄 بروزرسانی کامل کانال‌ها در $(date -u '+%Y-%m-%d %H:%M') UTC"
          for i in 1 2 3; do
            echo "Push attempt $i"
            if git push; then
              echo "Push succeeded"
              exit 0
            else
              echo "Push failed, waiting 5 seconds..."
              sleep 5
            fi
          done
          echo "Push failed after 3 attempts"
          exit 1
