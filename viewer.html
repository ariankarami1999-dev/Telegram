<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 نمایشگر کانال‌های تلگرام</title>
    <style>
        body {
            font-family: 'Vazirmatn', Tahoma, sans-serif;
            background: #0e1621;
            color: #e8edf2;
            padding: 20px;
            max-width: 900px;
            margin: 0 auto;
        }
        .channel-card {
            background: #17212b;
            border: 1px solid #1f3247;
            border-radius: 16px;
            margin: 16px 0;
            padding: 20px;
            transition: all 0.2s;
        }
        .channel-card:hover {
            border-color: #5288c1;
        }
        .channel-name {
            font-size: 20px;
            font-weight: 600;
            color: #5288c1;
            margin-bottom: 8px;
        }
        .channel-link {
            display: inline-block;
            background: #5288c1;
            color: white;
            padding: 8px 20px;
            border-radius: 24px;
            text-decoration: none;
            margin-top: 12px;
            font-size: 14px;
        }
        .channel-link:hover {
            background: #3d70a3;
        }
        .info {
            text-align: center;
            padding: 20px;
            background: #17212b;
            border-radius: 16px;
            margin-bottom: 20px;
        }
        hr {
            border-color: #1f3247;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="info">
        <h1>📡 آینه تلگرام</h1>
        <p>لیست تمام کانال‌های آینه شده</p>
        <p>👇 برای مشاهده محتوای هر کانال، روی دکمه کلیک کنید</p>
    </div>
    <div id="channels"></div>

    <script>
        // خواندن channels.txt
        fetch('channels.txt')
            .then(res => {
                if (!res.ok) throw new Error('channels.txt پیدا نشد');
                return res.text();
            })
            .then(text => {
                const channels = text.split('\n').filter(l => l.trim());
                const container = document.getElementById('channels');
                
                if (channels.length === 0) {
                    container.innerHTML = '<div style="text-align:center; padding:40px;">❌ هیچ کانالی وجود ندارد</div>';
                    return;
                }
                
                container.innerHTML = channels.map(ch => `
                    <div class="channel-card">
                        <div class="channel-name">📢 @${ch.trim()}</div>
                        <p>برای مشاهده آرشیو کامل پیام‌ها، روی دکمه زیر کلیک کنید:</p>
                        <a href="channels/${ch.trim()}.md" class="channel-link" target="_blank">📖 مشاهده محتوا (${ch.trim()}.md)</a>
                    </div>
                `).join('');
            })
            .catch(err => {
                document.getElementById('channels').innerHTML = `
                    <div style="background:#ff52521a; border:1px solid #ff5252; border-radius:16px; padding:20px; text-align:center;">
                        ❌ خطا: ${err.message}<br><br>
                        <small>اطمینان حاصل کنید فایل channels.txt در ریشه پروژه وجود دارد.</small>
                    </div>
                `;
            });
    </script>
</body>
</html>
