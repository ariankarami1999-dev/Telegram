<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 آینه تلگرام - نمایشگر بصری</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', system-ui, sans-serif;
            background: #0e1621;
            color: #e8edf2;
            min-height: 100vh;
        }

        /* حالت دو ستونه */
        .container {
            display: flex;
            min-height: 100vh;
        }

        /* سایدبار - لیست کانال‌ها */
        .sidebar {
            width: 280px;
            background: #17212b;
            border-left: 1px solid #1f3247;
            position: fixed;
            right: 0;
            top: 0;
            bottom: 0;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #1f3247;
            background: #0e1621;
            position: sticky;
            top: 0;
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #8fa8c8;
            margin-top: 8px;
        }

        .channel-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            cursor: pointer;
            transition: all 0.2s;
            border-bottom: 1px solid #1f3247;
        }

        .channel-item:hover {
            background: #1c2733;
        }

        .channel-item.active {
            background: #1f3247;
            border-right: 3px solid #5288c1;
        }

        .channel-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5288c1, #2d5fa0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            flex-shrink: 0;
        }

        .channel-info {
            flex: 1;
            min-width: 0;
        }

        .channel-name {
            font-weight: 500;
            font-size: 14px;
        }

        .channel-status {
            font-size: 11px;
            color: #8fa8c8;
        }

        /* بخش اصلی محتوا */
        .main-content {
            flex: 1;
            margin-right: 280px;
            padding: 20px;
            min-height: 100vh;
        }

        .content-wrapper {
            max-width: 800px;
            margin: 0 auto;
        }

        /* استایل‌های پیام‌ها (همون استایل‌های فایل اصلی) */
        .tg-channel-box {
            background: transparent !important;
            padding: 0 !important;
        }

        .tg-post {
            background: #17212b;
            border-radius: 16px;
            padding: 18px 22px;
            margin: 20px 0;
            border: 1px solid #1f3247;
        }

        .tg-post-header {
            background: #0e1621;
            margin: -18px -22px 16px -22px;
            padding: 10px 22px;
            border-radius: 16px 16px 0 0;
            font-size: 13px;
            color: #8fa8c8;
            border-bottom: 1px solid #1f3247;
        }

        .tg-forward {
            background: #1c2733;
            border-right: 4px solid #5288c1;
            padding: 8px 14px;
            border-radius: 12px;
            margin: 12px 0;
            font-size: 13px;
        }

        .tg-text {
            font-size: 15px;
            line-height: 1.7;
            margin: 14px 0;
        }

        .tg-text a {
            color: #64b5f6;
            text-decoration: none;
        }

        .tg-photo {
            margin: 12px 0;
            text-align: center;
        }

        .tg-photo img {
            max-width: 100%;
            border-radius: 12px;
        }

        .tg-album {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 8px;
            margin: 12px 0;
        }

        .tg-album-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 12px;
        }

        .tg-video video {
            width: 100%;
            border-radius: 12px;
        }

        .tg-dl-btn {
            display: inline-block;
            background: #5288c1;
            color: white;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            text-decoration: none;
            margin-top: 8px;
        }

        .tg-doc {
            background: #1c2733;
            border-radius: 12px;
            padding: 12px 16px;
            margin: 12px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .tg-footer {
            font-size: 11px;
            color: #8fa8c8;
            margin-top: 12px;
            padding-top: 8px;
            border-top: 1px solid #1f3247;
            display: flex;
            gap: 12px;
            justify-content: flex-end;
        }

        .tg-channel-header {
            text-align: center;
            padding: 20px;
            background: linear-gradient(135deg, #1f3247, #0e1621);
            border-radius: 20px;
            margin-bottom: 24px;
        }

        .tg-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid #5288c1;
        }

        .tg-telegram-btn {
            display: inline-block;
            background: #5288c1;
            color: white;
            padding: 8px 18px;
            border-radius: 30px;
            text-decoration: none;
            margin-top: 12px;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1f3247;
            border-top-color: #5288c1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid #ff5252;
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        /* اسکرول */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #17212b; }
        ::-webkit-scrollbar-thumb { background: #1f3247; border-radius: 3px; }

        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }
            .sidebar-header p,
            .channel-info {
                display: none;
            }
            .main-content {
                margin-right: 70px;
            }
            .channel-item {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>📡</h1>
            <p>کانال‌ها</p>
        </div>
        <div id="channel-list"></div>
    </div>
    <div class="main-content">
        <div class="content-wrapper" id="content-wrapper">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
</div>

<script>
    let channels = [];
    let currentChannel = null;

    // خواندن لیست کانال‌ها از channels.txt
    async function loadChannels() {
        try {
            const response = await fetch('channels.txt');
            if (!response.ok) {
                throw new Error('channels.txt پیدا نشد');
            }
            const text = await response.text();
            channels = text.split('\n')
                .filter(line => line.trim())
                .map(name => ({
                    name: name.trim(),
                    file: `channels/${name.trim()}.md`
                }));
            
            renderChannelList();
            
            if (channels.length > 0) {
                loadChannelContent(channels[0]);
            } else {
                document.getElementById('content-wrapper').innerHTML = `
                    <div class="error-message">
                        ❌ هیچ کانالی در channels.txt وجود ندارد.<br>
                        لطفاً ابتدا کانال‌ها را اضافه کنید.
                    </div>
                `;
            }
        } catch (error) {
            console.error(error);
            document.getElementById('channel-list').innerHTML = `
                <div style="padding: 16px; color: #ff8a8a; text-align: center;">
                    خطا: channels.txt یافت نشد
                </div>
            `;
        }
    }

    // رندر لیست کانال‌ها در سایدبار
    function renderChannelList() {
        const container = document.getElementById('channel-list');
        container.innerHTML = '';
        
        channels.forEach(ch => {
            const div = document.createElement('div');
            div.className = 'channel-item';
            if (currentChannel && currentChannel.name === ch.name) {
                div.classList.add('active');
            }
            
            const firstChar = ch.name.charAt(0).toUpperCase();
            
            div.innerHTML = `
                <div class="channel-avatar">${firstChar}</div>
                <div class="channel-info">
                    <div class="channel-name">@${ch.name}</div>
                    <div class="channel-status">کلیک کنید</div>
                </div>
            `;
            
            div.onclick = () => loadChannelContent(ch);
            container.appendChild(div);
        });
    }

    // بارگذاری محتوای کانال
    async function loadChannelContent(channel) {
        if (!channel) return;
        
        currentChannel = channel;
        renderChannelList();
        
        const wrapper = document.getElementById('content-wrapper');
        wrapper.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
        
        try {
            const response = await fetch(channel.file);
            if (!response.ok) {
                throw new Error(`فایل ${channel.file} یافت نشد`);
            }
            
            let content = await response.text();
            
            // اگر فایل مارک‌داون است و HTML ندارد
            if (!content.includes('<div class="tg-channel-box">')) {
                content = markdownToHtml(content, channel.name);
            }
            
            wrapper.innerHTML = content;
            
            // اسکرول به بالا
            document.querySelector('.main-content').scrollTop = 0;
            
        } catch (error) {
            wrapper.innerHTML = `
                <div class="error-message">
                    ❌ خطا در بارگذاری @${channel.name}<br>
                    ${error.message}<br><br>
                    <small>لطفاً ابتدا با اجرای اکشن GitHub، کانال را fetch کنید.</small>
                </div>
            `;
        }
    }

    // تبدیل ساده مارک‌داون به HTML
    function markdownToHtml(md, channelName) {
        let html = md;
        
        // استخراج عنوان کانال
        const titleMatch = md.match(/<h1>📡 (.+?)<\/h1>/);
        const channelTitle = titleMatch ? titleMatch[1] : channelName;
        
        // ساخت هدر کانال
        let header = `
            <div class="tg-channel-header">
                <div class="tg-avatar" style="margin: 0 auto;">📢</div>
                <h2>📡 ${channelTitle}</h2>
                <p>@${channelName}</p>
                <a href="https://t.me/${channelName}" class="tg-telegram-btn" target="_blank">✈ باز کردن در تلگرام</a>
            </div>
        `;
        
        // تبدیل خطوط به پاراگراف
        let lines = html.split('\n');
        let inCode = false;
        let processed = [];
        
        for (let line of lines) {
            if (line.startsWith('# ')) {
                continue; // هدر تکراری نریزیم
            } else if (line.startsWith('## ')) {
                processed.push(`<h3>${line.substring(3)}</h3>`);
            } else if (line.startsWith('- ') || line.startsWith('* ')) {
                processed.push(`<li>${line.substring(2)}</li>`);
            } else if (line.trim() === '---') {
                processed.push('<hr>');
            } else if (line.trim() && !line.startsWith('```')) {
                processed.push(`<p>${line}</p>`);
            }
        }
        
        let body = processed.join('\n');
        
        // تبدیل لینک‌ها
        body = body.replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
        
        return `
            <div class="tg-channel-box">
                ${header}
                ${body}
                <hr>
                <p style="text-align: center; font-size: 12px; color: #8fa8c8;">
                    ✨ آخرین بروزرسانی: ${new Date().toLocaleDateString('fa-IR')}
                </p>
            </div>
        `;
    }

    // شروع
    loadChannels();
</script>
</body>
</html>
