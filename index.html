<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📡 آینه تلگرام</title>
    <link href="https://fonts.googleapis.com/css2?family=Vazirmatn:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Vazirmatn', system-ui, sans-serif;
            background: #0e1621;
            color: #e8edf2;
            min-height: 100vh;
        }

        /* سایدبار برای لیست کانال‌ها */
        .app {
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .sidebar {
            width: 280px;
            background: #17212b;
            border-left: 1px solid #1f3247;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
        }

        .sidebar-header {
            padding: 20px 16px;
            border-bottom: 1px solid #1f3247;
            background: #0e1621;
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: #8fa8c8;
            margin-top: 8px;
        }

        .channels-list {
            flex: 1;
            overflow-y: auto;
            padding: 8px;
        }

        .channel-btn {
            display: flex;
            align-items: center;
            gap: 12px;
            width: 100%;
            padding: 12px 14px;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: #e8edf2;
            font-family: inherit;
            font-size: 14px;
            font-weight: 500;
            text-align: right;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-bottom: 4px;
        }

        .channel-btn:hover {
            background: #1c2733;
        }

        .channel-btn.active {
            background: #1f3247;
            border-right: 3px solid #5288c1;
        }

        .channel-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #5288c1, #2d5fa0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }

        .channel-name {
            flex: 1;
            text-align: right;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* بخش اصلی محتوا */
        .main-content {
            flex: 1;
            overflow-y: auto;
            background: #0e1621;
            padding: 20px;
        }

        .content-frame {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* لودینگ */
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 300px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1f3247;
            border-top-color: #5288c1;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .error-message {
            background: rgba(255, 82, 82, 0.1);
            border: 1px solid #ff5252;
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            color: #ff8a8a;
        }

        /* اسکرول بار */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #17212b; }
        ::-webkit-scrollbar-thumb { background: #1f3247; border-radius: 3px; }

        /* ریسپانسیو */
        @media (max-width: 640px) {
            .sidebar {
                width: 70px;
            }
            .sidebar-header h1 span,
            .sidebar-header p,
            .channel-name {
                display: none;
            }
            .channel-btn {
                justify-content: center;
                padding: 12px;
            }
            .channel-avatar {
                margin: 0;
            }
            .main-content {
                padding: 12px;
            }
        }

        /* استایل‌هایی که از فایل اصلی می‌آیند */
        .tg-channel-box {
            background: transparent !important;
            padding: 0 !important;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>📡 آینه تلگرام</h1>
            <p>لیست کانال‌ها</p>
        </div>
        <div class="channels-list" id="channels-list">
            <div class="loading" style="min-height: auto; padding: 20px;">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
    <div class="main-content" id="main-content">
        <div class="content-frame">
            <div class="loading">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
</div>

<script>
    // لیست کانال‌ها (از channels/README.md گرفته می‌شود)
    let channels = [];
    let currentChannel = null;

    // بارگذاری لیست کانال‌ها
    async function loadChannelsList() {
        try {
            const response = await fetch('channels/README.md');
            if (!response.ok) throw new Error('نتوانستیم لیست کانال‌ها را بارگذاری کنیم');
            const md = await response.text();
            
            // استخراج کانال‌ها از جدول مارک‌داون
            const lines = md.split('\n');
            channels = [];
            for (let line of lines) {
                // الگوی: | [@channel](./channel.md) | ...
                const match = line.match(/\[\@([^\[\]]+?)\]\(\.\/([^\)]+\.md)\)/);
                if (match) {
                    channels.push({
                        name: match[1],
                        file: match[2]
                    });
                }
            }
            
            // اگر کانالی پیدا نشد، از channels.txt مستقیم بخوان
            if (channels.length === 0) {
                const txtResponse = await fetch('channels.txt');
                if (txtResponse.ok) {
                    const txt = await txtResponse.text();
                    const names = txt.split('\n').filter(l => l.trim());
                    channels = names.map(name => ({
                        name: name.trim(),
                        file: `${name.trim()}.md`
                    }));
                }
            }
            
            renderSidebar();
            
            // اگر کانالی هست، اولین کانال را انتخاب کن
            if (channels.length > 0) {
                loadChannel(channels[0]);
            } else {
                document.getElementById('channels-list').innerHTML = '<div style="padding: 20px; text-align: center; color: #8fa8c8;">❌ هیچ کانالی یافت نشد</div>';
                document.getElementById('main-content').innerHTML = '<div class="content-frame"><div class="error-message">❌ هیچ کانالی در لیست وجود ندارد.<br>لطفاً ابتدا با اکشن fetch کانال‌ها را اضافه کنید.</div></div>';
            }
        } catch (error) {
            console.error('Error loading channels:', error);
            document.getElementById('channels-list').innerHTML = `<div style="padding: 20px; text-align: center; color: #ff8a8a;">⚠ خطا: ${error.message}</div>`;
        }
    }

    // رندر کردن سایدبار
    function renderSidebar() {
        const container = document.getElementById('channels-list');
        container.innerHTML = '';
        
        channels.forEach(ch => {
            const btn = document.createElement('button');
            btn.className = 'channel-btn';
            if (currentChannel && currentChannel.name === ch.name) {
                btn.classList.add('active');
            }
            
            // حرف اول کانال برای آواتار
            const firstChar = ch.name.charAt(0).toUpperCase();
            
            btn.innerHTML = `
                <div class="channel-avatar">${firstChar}</div>
                <span class="channel-name">@${ch.name}</span>
            `;
            
            btn.onclick = () => loadChannel(ch);
            container.appendChild(btn);
        });
    }

    // بارگذاری محتوای یک کانال
    async function loadChannel(channel) {
        if (!channel) return;
        
        currentChannel = channel;
        renderSidebar();
        
        const contentContainer = document.getElementById('main-content');
        contentContainer.innerHTML = `
            <div class="content-frame">
                <div class="loading">
                    <div class="spinner"></div>
                </div>
            </div>
        `;
        
        try {
            const response = await fetch(`channels/${channel.file}`);
            if (!response.ok) throw new Error(`نتوانستیم ${channel.file} را بارگذاری کنیم`);
            
            let mdContent = await response.text();
            
            // تبدیل مارک‌داون به HTML ساده (با یک کتابخانه کوچک دستی)
            const htmlContent = convertMarkdownToHtml(mdContent);
            
            contentContainer.innerHTML = `
                <div class="content-frame">
                    ${htmlContent}
                </div>
            `;
            
            // اسکرول به بالای صفحه
            contentContainer.scrollTop = 0;
            
        } catch (error) {
            console.error('Error loading channel:', error);
            contentContainer.innerHTML = `
                <div class="content-frame">
                    <div class="error-message">
                        ❌ خطا در بارگذاری کانال @${channel.name}<br>
                        ${error.message}
                    </div>
                </div>
            `;
        }
    }

    // تبدیل ساده مارک‌داون به HTML (برای نمایش صحیح)
    function convertMarkdownToHtml(md) {
        // اگه فایل قبلاً HTML داشت (مثل چیزی که render_markdown تولید می‌کند)
        if (md.includes('<div class="tg-channel-box">')) {
            return md;
        }
        
        // در غیر این صورت، یک تبدیل ساده انجام بده
        let html = md;
        
        // هدها
        html = html.replace(/^# (.*?)$/gm, '<h1>$1</h1>');
        html = html.replace(/^## (.*?)$/gm, '<h2>$1</h2>');
        html = html.replace(/^### (.*?)$/gm, '<h3>$1</h3>');
        
        // لینک‌ها
        html = html.replace(/\[([^\]]+)\]\(([^\)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
        
        // خط افقی
        html = html.replace(/^---$/gm, '<hr>');
        
        // پاراگراف‌ها
        const paragraphs = html.split('\n\n');
        html = paragraphs.map(p => {
            if (p.startsWith('<h') || p.startsWith('<hr') || p.startsWith('<a') || p.trim() === '') {
                return p;
            }
            return `<p>${p}</p>`;
        }).join('\n\n');
        
        // خط جدید به برچسب br
        html = html.replace(/\n/g, '<br>');
        
        return `<div class="tg-channel-box" style="background: transparent; padding: 0;">${html}</div>`;
    }

    // شروع برنامه
    loadChannelsList();
</script>
</body>
</html>
